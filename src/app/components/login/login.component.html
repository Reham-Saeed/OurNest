<div class="flex w-full h-screen overflow-hidden">

  <div class="hidden md:flex w-1/2 h-full bg-[var(--color-pink)]/30 flex-col justify-center items-center p-12 relative">

    <div
      class="absolute w-96 h-96 bg-[var(--color-white)] rounded-full mix-blend-overlay filter blur-3xl opacity-50 animate-pulse">
    </div>

    <img src="assets/big-logo.png" alt="Our Nest Family"
      class="w-full max-w-md object-contain mb-6 drop-shadow-sm relative z-10">



  </div>

  <div class="w-full md:w-2/3 h-full flex flex-col justify-center px-8 md:px-16 bg-white pt-24"
    style="font-family: var(--font-primary);">

    <div class="max-w-xl w-full mx-auto">

      <div class="mb-8">
        <h2 class="text-gray-500 text-lg font-normal mb-1">Welcome Back!!</h2>
        <h1 class="text-[var(--color-dark-pink)] text-5xl font-normal">Log In</h1>
      </div>

      <form [formGroup]="loginForm" class="space-y-6">

        <div>
          <label for="login-phone" class="block text-[var(--color-dark-pink)] text-base mb-2">Phone Number</label>
          <div class="relative">
            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-[var(--color-dark-pink)] text-lg">
              <i class="fa-solid fa-phone"></i>
            </span>
            <input formControlName="phone" type="tel" id="login-phone" name="phone"
              placeholder="Enter your phone number"
              class="w-full border border-[var(--color-dark-pink)] rounded-xl py-3 pl-12 pr-4 outline-none focus:border-[var(--color-dark-pink)] transition-colors text-gray-700">
          </div>
          @if (loginForm.get('phone')?.invalid && loginForm.get('phone')?.touched) {
          <div class="text-red-500 text-sm mt-1 ml-1">
            <div>Phone number is required.</div>
          </div>
          }
        </div>

        <div>
          <label for="login-password" class="block text-[var(--color-dark-pink)] text-base mb-2">Password</label>
          <div class="relative">
            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-[var(--color-dark-pink)] text-lg">
              <i class="fa-solid fa-lock"></i>
            </span>
            <input formControlName="password" [type]="hidePassword ? 'password' : 'text'" id="login-password"
              name="password" placeholder="Enter your password"
              class="w-full border border-[var(--color-dark-pink)] rounded-xl py-3 pl-12 pr-12 outline-none focus:border-[var(--color-dark-pink)] transition-colors text-gray-700">
            <button type="button" (click)="togglePasswordVisibility()"
              class="absolute right-4 top-1/2 -translate-y-1/2 text-[var(--color-dark-pink)] hover:opacity-100 transition-opacity">
              <i [class]="hidePassword ? 'fa-regular fa-eye-slash' : 'fa-regular fa-eye'" class="cursor-pointer"></i>
            </button>
          </div>
          @if (loginForm.get('password')?.invalid && loginForm.get('password')?.touched) {
          <div class="text-red-500 text-sm mt-1 ml-1">
            <div>Password is required.</div>
          </div>
          }
        </div>

        <div class="flex justify-between items-center text-sm">
          <label for="login-remember" class="flex items-center cursor-pointer select-none">
            <input formControlName="remember" type="checkbox" id="login-remember" name="remember" class="sr-only" />
            <div class="toggle-switch relative w-10 h-6 bg-gray-300 rounded-full transition-colors duration-300">
              <div
                class="toggle-knob absolute left-1 top-1 bg-white w-4 h-4 rounded-full transition-transform duration-300">
              </div>
            </div>
            <span class="toggle-text ml-3 text-gray-500 text-sm transition-colors duration-300">
              Remember me
            </span>
          </label>
          <a routerLink="/forgot-password" class="text-[var(--color-dark-pink)] hover:underline">Forget password ?</a>
        </div>

        <button 
        (click)="login()"
        class="w-full bg-[var(--color-dark-pink)] text-white text-xl py-3 rounded-xl hover:brightness-110 transition-all shadow-sm cursor-pointer 
           disabled:bg-gray-300 disabled:cursor-not-allowed disabled:hover:brightness-100 disabled:shadow-none">
          Log In
        </button>

      </form>

      <div class="flex items-center my-6">
        <div class="flex-1 border-t border-[var(--color-pink)] opacity-60"></div>
        <span class="px-3 text-gray-400 text-sm">or</span>
        <div class="flex-1 border-t border-[var(--color-pink)] opacity-60"></div>
      </div>

      <div class="space-y-3">
        <button
          class="w-full border border-[var(--color-pink)] py-3 rounded-xl flex justify-center items-center gap-3 text-gray-700 font-medium hover:bg-pink-50 transition-colors cursor-pointer">
          <!-- <i class="fa-brands fa-google text-xl text-red-500"></i> -->
          <img src="assets/google-icon.svg" alt="My Icon" class="w-6 h-6 translate-y-[2px]">
          Sign In with Google
        </button>

        <button
          class="w-full border border-[var(--color-pink)] py-3 rounded-xl flex justify-center items-center gap-3 text-gray-700 font-medium hover:bg-pink-50 transition-colors cursor-pointer">
          <i class="fa-brands fa-facebook text-xl text-blue-600"></i>
          Sign In with Facebook
        </button>
      </div>

      <div class="text-center mt-8 text-gray-500">
        Don't have an account?
        <a routerLink="/signup" class="text-[var(--color-dark-pink)] font-bold hover:underline ml-1">Sign
          up</a>
      </div>

    </div>
  </div>
</div>
