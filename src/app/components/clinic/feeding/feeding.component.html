<div class="flex flex-col h-full overflow-hidden">
  <!-- Chat area -->
  <div class="flex-1 overflow-y-auto p-4 space-y-4 hide-scrollbar">
    <!-- Bot welcome -->
    <div class="flex gap-2 items-start">
      <img src="assets/chat-bot.svg" alt="" />
      <div class="border border-[#1919194D] rounded-[8px] p-4 text-sm bg-[#B349620F] max-w-md">
        Hello! <br />
        I'm your <b>Feeding AI assistant</b>. <br />
        Upload a food image and I will analyze it for you.
      </div>
    </div>

    <!-- Preview image -->
    @if (previewImage) {
      <div class="flex justify-end">
        <div class="w-60 overflow-hidden rounded-lg">
          <img [src]="previewImage" class="w-full h-full object-cover" />
        </div>
      </div>
    }

    <!-- AI Response -->
    @if (prediction) {
      <div class="flex gap-2 items-start">
        <img src="assets/chat-bot.svg" alt="" />

        <div
          class="border border-[#1919194D] rounded-[8px] px-4 py-2 text-sm max-w-md bg-[#B349620F] leading-6"
          [innerHTML]="prediction"
        ></div>
      </div>
    }

    <!-- Loading -->
    @if (loading) {
      <div class="flex items-start gap-2">
        <img src="assets/chat-bot.svg" alt="" />
        <div
          class="border border-[#1919194D] rounded-[8px] p-4 bg-[#B349620F] flex gap-1 items-center"
        >
          <span class="dot"></span>
          <span class="dot delay-1"></span>
          <span class="dot delay-2"></span>
        </div>
      </div>
    }
  </div>

  <!-- Input -->
  <div class="shrink-0 p-4 pb-7">
    <button
      (click)="fileInput.click()"
      [disabled]="loading"
      class="flex items-center justify-center gap-3 text-2xl text-[#8E8E8E] border-[0.5px] border-[#B34962] rounded-[20px] border-dashed bg-[#FBEAEE] px-14 py-3 shadow-[0px_4px_4px_0px_#00000040]"
    >
      <i class="fa-solid fa-paperclip rotate-225"></i>
      Attach
    </button>

    <input
      type="file"
      accept="image/*"
      #fileInput
      class="hidden"
      (change)="onFileSelected($event)"
    />
  </div>
</div>
