<div class="min-h-screen bg-[linear-gradient(180deg,#FFFFFF_0%,#FFC5D0_100%)] pt-10 pb-20 px-4 md:px-8 font-sans">

  <div class="flex items-center justify-center gap-8 mb-16">
    <button (click)="prevMonth()" class="text-[var(--color-dark-pink)] hover:scale-110 transition-transform p-2">
      <i class="fa-solid fa-chevron-left text-xl"></i>
    </button>
    <h1 class="text-xl md:text-2xl font-bold text-black">{{ currentMonth }}</h1>
    <button (click)="nextMonth()" class="text-[var(--color-dark-pink)] hover:scale-110 transition-transform p-2">
      <i class="fa-solid fa-chevron-right text-xl"></i>
    </button>
  </div>

  <div class="max-w-5xl mx-auto flex flex-col lg:flex-row items-center justify-center gap-16 lg:gap-32">

    <div class="relative w-[380px] h-[380px] flex items-center justify-center">

      @for (day of days; track day.value) {
      <div class="absolute top-1/2 left-1/2 w-10 h-10 -mt-5 -ml-5 flex items-center justify-center"
        [ngStyle]="{'transform': day.transform}">
        <div [class]="day.wrapperClass">
          <span [class]="day.textClass">{{ day.value }}</span>
        </div>
      </div>
      }

      <div class="relative w-[280px] h-[280px] rounded-full shadow-xl p-1.5 flex items-center justify-center z-0"
        [style.background]="dynamicRingBackground">

        <div
          class="absolute top-1/2 left-1/2 w-4 h-4 bg-white border-[3px] border-teal-400 rounded-full shadow-md z-20 -mt-2 -ml-2 "
          [ngStyle]="{'transform': knobTransform}">
        </div>

        <div
          class="relative w-full h-full bg-white rounded-full overflow-hidden flex flex-col items-center shadow-inner">

          <div
            class="absolute bottom-0 left-0 w-full flex items-end transition-all duration-1000 ease-in-out pointer-events-none select-none"
            [style.height.%]="//liquidFillPercentage">
            <img src="/assets/period-tracker-arch.svg" alt="liquid arch"
              class="w-full min-w-full object-cover object-bottom" />
          </div>

          <div class="relative z-10 flex flex-col items-center justify-center h-full pt-8 w-full text-center">
            <span class="text-sm font-medium text-gray-800 tracking-wide mb-1">Period in</span>
            <span class="text-[3rem] font-bold text-black leading-none mb-10">10 Days</span>

            <div class="mt-auto pb-8 flex flex-col items-center">
              <span class="text-sm font-medium text-gray-800 mb-2">Low chance of getting pregnant</span>
              <button class="text-sm font-bold text-black hover:text-[var(--color-dark-pink)] transition-colors">
                +Add Period
              </button>
            </div>
          </div>

        </div>
      </div>

    </div>

    <div class="flex flex-col gap-4 w-full max-w-[280px]">
      <div
        class="border-[3px] border-teal-300 rounded-2xl py-4 px-6 text-center font-bold text-gray-800 bg-white shadow-sm cursor-pointer hover:-translate-y-1 transition-transform">
        High fertility
      </div>
      <div
        class="border-[3px] border-[#c06b7a] rounded-2xl py-4 px-6 text-center font-bold text-gray-800 bg-white shadow-sm cursor-pointer hover:-translate-y-1 transition-transform">
        Menstrual days
      </div>
      <div
        class="border-[3px] border-gray-700 rounded-2xl py-4 px-6 text-center font-bold text-gray-800 bg-white shadow-sm cursor-pointer hover:-translate-y-1 transition-transform">
        Medium fertility
      </div>
      <div
        class="border-[3px] border-green-400 rounded-2xl py-4 px-6 text-center font-bold text-gray-800 bg-white shadow-sm cursor-pointer hover:-translate-y-1 transition-transform">
        Peak fertility
      </div>
    </div>

  </div>
</div>
