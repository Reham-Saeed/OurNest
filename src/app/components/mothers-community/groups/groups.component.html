<section class="max-w-[1000px] lg:min-w-[1000px] mx-auto px-4 sm:px-6 lg:px-0">
  <div class="space-y-4 max-w-[1000px] mx-auto px-4 sm:px-6 lg:px-0">
    @for (group of groups; track $index) {
    <div class="bg-white rounded-3xl p-4 sm:p-6 md:p-8 shadow-lg">
      <div class="flex flex-col sm:flex-row sm:items-start space-y-4 sm:space-y-0 sm:space-x-4">
        <div
          class="w-16 h-16 bg-gradient-to-br from-[#56DADA] to-[#45B8B8] rounded-2xl flex items-center justify-center flex-shrink-0"
        >
          <i class="fa-solid fa-user-group text-white"></i>
        </div>
        <div class="flex-1">
          <h3 class="text-lg sm:text-xl font-semibold text-gray-800 mb-2">
            {{ group.title }}
          </h3>

          <p class="text-gray-600 mb-3 text-sm sm:text-base">
            {{ group.description }}
          </p>

          <p class="text-sm text-gray-500 mb-4">{{ group.members }} members</p>

          <button
            class="px-4 sm:px-6 py-2 bg-[#B34962] text-white rounded-full hover:bg-[#8d3a4d] transition-colors text-sm sm:text-base font-medium"
          >
            Join Group
          </button>
        </div>
      </div>
    </div>
    }
  </div>
</section>
