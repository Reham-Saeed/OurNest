<section class="max-w-[1000px] lg:min-w-[1000px] mx-auto px-4 sm:px-6 lg:px-0">
  <div class="bg-white rounded-3xl p-4 sm:p-6 md:p-8 shadow-lg space-y-4">
    @for (user of users; track $index) {
    <div
      class="flex flex-col sm:flex-row sm:items-center justify-between space-y-4 sm:space-y-0 sm:space-x-4"
    >
      <div class="flex items-center space-x-4">
        <div class="relative">
          <div
            class="w-14 h-14 bg-gradient-to-br from-[#FFC5D0] to-[#FFB0C5] rounded-full flex items-center justify-center text-white font-semibold text-lg"
          >
            {{ user.initials }}
          </div>
          <span
            class="absolute bottom-0 right-0 w-4 h-4 rounded-full border-2 border-white"
            [ngClass]="user.color"
          ></span>
        </div>

        <div>
          <h3 class="font-semibold text-gray-800">{{ user.name }}</h3>
          <p class="text-sm text-gray-500 capitalize">{{ user.status }}</p>
        </div>
      </div>

      <div
        class="flex flex-col sm:flex-row items-start sm:items-center space-y-2 sm:space-y-0 sm:space-x-3"
      >
        <button
          (click)="openChat()"
          class="px-6 py-2 bg-[#56DADA] text-white rounded-full hover:bg-[#45B8B8] transition-colors flex items-center justify-center"
        >
          <span>Message</span>
        </button>
        <button
          (click)="unfriend(user)"
          class="px-4 py-2 bg-[#B34962] text-white rounded-full hover:bg-[#8d3a4d] transition-colors text-sm"
        >
          Unfriend
        </button>
      </div>
    </div>
    }
  </div>
</section>
