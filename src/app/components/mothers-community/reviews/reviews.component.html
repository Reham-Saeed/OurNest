<section class="max-w-[1000px] mx-auto px-4 sm:px-6 lg:px-0">
  <div class="bg-white rounded-3xl p-4 sm:p-6 shadow-lg mb-6">
    <textarea
      placeholder="Share your thoughts with the community..."
      class="w-full px-4 sm:px-6 py-3 sm:py-4 border-2 border-[#FFC5D0] rounded-2xl focus:outline-none focus:border-[#B34962] transition-colors resize-none placeholder-gray-400"
      rows="3"
    ></textarea>
    <div class="flex justify-end mt-4">
      <button
        class="px-6 sm:px-8 py-2 sm:py-3 bg-[#B34962] text-white rounded-full hover:bg-[#8d3a4d] transition-all duration-300 shadow-md hover:shadow-lg"
      >
        Post
      </button>
    </div>
  </div>

  @for(post of posts; track $index){
  <div class="bg-white rounded-3xl p-4 sm:p-8 shadow-lg hover:shadow-xl transition-shadow mb-6">
    <div class="flex flex-col sm:flex-row sm:items-center space-y-2 sm:space-y-0 sm:space-x-4 mb-4">
      <img
        [src]="post.image"
        alt="{{ post.name }}"
        class="w-12 h-12 rounded-full object-cover border"
      />
      <h3 class="font-semibold text-gray-800">{{ post.name }}</h3>
    </div>

    <p class="text-gray-700 mb-6">
      {{ post.text }}
    </p>

    <div
      class="flex flex-row items-center space-x-6 space-y-2 space-y-0 pt-4 border-t border-gray-300"
    >
      <button class="flex items-center space-x-2 text-[#B34962] transition-colors">
        <i class="fa-regular fa-heart fa-xl"></i>
        <span>{{ post.likes }}</span>
      </button>

      <button
        class="flex items-center space-x-2 text-[#B34962] transition-colors"
        (click)="toggleComments(post)"
      >
        <i class="fa-regular fa-message fa-xl"></i>
        <span>{{ post.comments.length }}</span>
      </button>

      <button class="flex items-center space-x-2 text-[#B34962] transition-colors ml-0 md:ml-auto">
        <i class="fa-solid fa-share-nodes fa-xl"></i>
      </button>
    </div>

    @if (post.showComments) {
    <div class="mt-6 border-t border-gray-200 pt-4">
      @for (comment of post.comments; track $index) {
      <div class="mb-4">
        <div class="flex flex-col sm:flex-row sm:items-center justify-between">
          <div>
            <div
              class="flex flex-col sm:flex-row sm:items-center space-y-1 sm:space-y-0 sm:space-x-2"
            >
              <img [src]="comment.image" class="w-8 h-8 rounded-full object-cover border" />
              <p class="font-semibold">{{ comment.name }}</p>
              <span class="text-gray-500 text-sm">· {{ comment.time }}</span>
            </div>
            <p class="ml-0 sm:ml-10">{{ comment.text }}</p>
          </div>
          <div class="flex space-x-3 mt-2 sm:mt-0">
            <i class="fa-regular fa-thumbs-up"></i>
            <i class="fa-regular fa-thumbs-down"></i>
          </div>
        </div>

        <button class="ml-0 sm:ml-10 text-sm text-[#B34962]" (click)="startReply(post, $index)">
          Reply
        </button>

        @if (post.replyIndex === $index) {
        <div class="ml-0 sm:ml-10 mt-2 flex flex-col sm:flex-row gap-2">
          <input
            [(ngModel)]="post.replyText"
            placeholder="Write a reply..."
            class="flex-1 px-4 py-2 border rounded-2xl focus:outline-none focus:border-[#B34962]"
          />
          <button
            class="px-4 py-2 bg-[#B34962] text-white rounded-full"
            (click)="addReply(post, $index)"
          >
            <i class="fa-solid fa-paper-plane rotate-45"></i>
          </button>
        </div>
        } @for (r of comment.replies; track $index) {
        <div class="ml-0 sm:ml-10 mt-2 pl-4 border-l-2 border-gray-200"></div>
        }
      </div>
      }

      <div class="mt-4 flex flex-col sm:flex-row gap-2">
        <input
          [(ngModel)]="post.newComment"
          placeholder="write a comment..."
          class="flex-1 px-4 py-2 border rounded-2xl focus:outline-none focus:border-[#B34962]"
        />
        <button class="px-4 py-2 bg-[#B34962] text-white rounded-full" (click)="addComment(post)">
          <i class="fa-solid fa-paper-plane rotate-45"></i>
        </button>
      </div>
    </div>
    }
  </div>
  }
</section>
