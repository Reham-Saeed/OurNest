<div class="max-w-4xl mx-auto space-y-8">
  <!-- Header -->
  <div class="flex items-center gap-4">
    <div class="w-14 h-14 rounded-full bg-[#b34962] flex items-center justify-center">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="w-7 h-7 text-white"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="1.5"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="m11.25 11.25.041-.02a.75.75 0 0 1 1.063.852l-.708 2.836a.75.75 0 0 0 1.063.853l.041-.021M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9-3.75h.008v.008H12V8.25Z"
        />
      </svg>
    </div>

    <h1 class="text-3xl font-medium text-gray-800">About OurNest</h1>
  </div>

  <!-- Description Card -->
  <div class="bg-white border border-[#B34962] rounded-2xl p-8">
    <p class="text-lg text-gray-500 leading-relaxed mb-5">
      OurNest is a supportive platform designed to help mothers and families track pregnancy,
      health, and daily wellness in one place.
    </p>

    <p class="text-lg text-gray-500 leading-relaxed">
      We aim to build a safe community where parents can connect, share experiences, and get trusted
      information.
    </p>
  </div>

  <!-- Features -->
  <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
    <div
      *ngFor="let feature of features"
      class="border border-[#B34962] rounded-2xl p-6 flex flex-col items-center text-center gap-4 bg-white"
    >
      <!-- Icon -->
      <div class="w-16 h-16 rounded-2xl bg-pink-50 flex items-center justify-center">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="w-8 h-8 text-[#B34962]"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="1.5"
          stroke="currentColor"
        >
          <path stroke-linecap="round" stroke-linejoin="round" [attr.d]="feature.icon" />
        </svg>
      </div>

      <!-- Text -->
      <div>
        <h3 class="text-xl font-medium text-gray-800">
          {{ feature.title }}
        </h3>

        <p class="text-base text-gray-400 mt-2 leading-relaxed">
          {{ feature.subtitle }}
        </p>
      </div>
    </div>
  </div>
</div>
