<div class="max-w-4xl mx-auto space-y-8">

  <!-- Header -->
  <div class="flex items-center gap-4">
    <div
      class="w-14 h-14 rounded-full bg-[#b34962] flex items-center justify-center"
    >
      <svg xmlns="http://www.w3.org/2000/svg"
           class="w-7 h-7 text-white"
           fill="none"
           viewBox="0 0 24 24"
           stroke-width="1.5"
           stroke="currentColor">

        <path stroke-linecap="round"
              stroke-linejoin="round"
              d="M9.879 7.519c1.171-1.025 3.071-1.025 4.242 0 1.172 1.025 1.172 2.687 0 3.712-.203.179-.43.326-.67.442-.745.361-1.45.999-1.45 1.827v.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 5.25h.008v.008H12v-.008Z" />
      </svg>
    </div>

    <h1 class="text-3xl font-medium text-gray-800">
      Support
    </h1>
  </div>

  <!-- Description -->
  <p class="text-lg text-gray-500 leading-relaxed">
    We're always here to help you. Feel free to contact us anytime through the following channels.
  </p>

  <!-- Contact Cards -->
  <div class="flex flex-col gap-5">

    <div
      *ngFor="let item of contactInfo"
      class="flex items-center gap-5 bg-white border border-[#B34962] rounded-2xl px-6 py-6"
    >

      <!-- Icon -->
      <div
        class="w-14 h-14 rounded-2xl bg-pink-50 flex items-center justify-center flex-shrink-0"
      >
        <svg xmlns="http://www.w3.org/2000/svg"
             class="w-7 h-7 text-[#B34962]"
             fill="none"
             viewBox="0 0 24 24"
             stroke-width="1.5"
             stroke="currentColor">

          <path stroke-linecap="round"
                stroke-linejoin="round"
                [attr.d]="item.icon" />
        </svg>
      </div>

      <!-- Text -->
      <div>
        <h2 class="text-xl font-medium text-gray-800">
          {{ item.title }}
        </h2>

        <p class="text-base text-gray-400 mt-1">
          {{ item.value }}
        </p>
      </div>

    </div>

  </div>

</div>
