<div class="max-w-4xl mx-auto space-y-8">

  <!-- Header -->
  <div class="flex items-center gap-4">
    <div
      class="w-14 h-14 rounded-full bg-[#b34962] flex items-center justify-center"
    >
      <svg xmlns="http://www.w3.org/2000/svg"
           class="w-7 h-7 text-white"
           fill="none"
           viewBox="0 0 24 24"
           stroke-width="1.5"
           stroke="currentColor">

        <path stroke-linecap="round"
              stroke-linejoin="round"
              d="M9 12.75 11.25 15 15 9.75m-3-7.036A11.959 11.959 0 0 1 3.598 6 11.99 11.99 0 0 0 3 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285Z" />
      </svg>
    </div>

    <h1 class="text-3xl font-medium text-gray-800">
      Privacy Policy
    </h1>
  </div>

  <!-- Intro -->
  <p class="text-lg text-gray-500 leading-relaxed">
    We respect your privacy and are committed to protecting your personal data.
  </p>

  <!-- Policy Sections -->
  <div
    class="bg-white border border-[#B34962] rounded-2xl overflow-hidden"
  >

    <div
      *ngFor="let section of sections; let last = last"
      class="px-7 py-6"
      [class.border-b]="!last"
      [class.border-pink-100]="!last"
    >

      <div class="flex items-start gap-5">

        <!-- Number -->
        <div
          class="w-11 h-11 rounded-xl bg-pink-50 flex items-center justify-center flex-shrink-0"
        >
          <span class="text-base font-semibold text-[#B34962]">
            {{ section.number }}
          </span>
        </div>

        <!-- Content -->
        <div>
          <h2 class="text-xl font-medium text-gray-800 mb-2">
            {{ section.title }}
          </h2>

          <p class="text-base text-gray-400 leading-relaxed">
            {{ section.content }}
          </p>
        </div>

      </div>

    </div>

  </div>

</div>
