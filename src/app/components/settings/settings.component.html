<section
  class="bg-[linear-gradient(180deg,#FFFFFF_0%,#FFC5D0_100%)] mx-auto py-16 px-4 sm:px-6 lg:px-20 grid grid-cols-12 gap-10"

        </button>

      <div class="rounded-xl border border-[#B34962] divide-y-[0.3px] divide-pink-200 mb-5">

          *ngIf="showPartner"
