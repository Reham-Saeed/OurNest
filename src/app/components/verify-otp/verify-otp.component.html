<div class="flex w-full min-h-[calc(100vh-90px)]">

  <div
    class="hidden md:flex w-1/2 bg-[var(--color-pink)]/30 flex-col justify-center items-center p-12 relative overflow-hidden">
    <div
      class="absolute w-96 h-96 bg-[var(--color-white)] rounded-full mix-blend-overlay filter blur-3xl opacity-50 animate-pulse top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2">
    </div>

    <img src="assets/big-logo.png" alt="Our Nest Family"
      class="w-full max-w-md object-contain mb-6 drop-shadow-sm relative z-10">
  </div>

  <div class="w-full md:w-2/3 flex flex-col justify-center px-8 md:px-16 bg-white py-12"
    style="font-family: var(--font-primary);">

    <div class="w-full h-full flex flex-col justify-center px-8 md:px-16 py-8">
      <div class="max-w-xl w-full mx-auto">


        <div class="w-full h-full flex flex-col justify-center px-8 md:px-16 py-8">
          <div class="max-w-md w-full mx-auto">

            <div class="mb-12 text-center">
              <h1 class="text-[var(--color-dark-pink)] text-4xl font-normal mb-3">Verify Code</h1>
              <p class="text-gray-500 text-lg">
                Enter the 4-digit code sent to <br>
                <span class="font-bold text-[var(--color-dark-pink)]">+20 10xxxxxxxxx</span>
              </p>
            </div>

            <form [formGroup]="otpForm" (ngSubmit)="onSubmit()" class="space-y-8">

              <div class="flex justify-center">
                <div class="relative w-full max-w-xs"> <input formControlName="otp" type="tel" maxlength="4"
                    placeholder="0000" class="
                      w-full h-24 
                      bg-white 
                      text-[var(--color-dark-pink)] 
                      text-5xl font-bold text-center tracking-[0.8em] 
                      rounded-3xl 
                      shadow-lg shadow-pink-100/50 
                      border-2 border-[var(--color-dark-pink)] 
                      outline-none 
                      transition-all duration-300 ease-out
                      placeholder:text-gray-200 placeholder:font-normal placeholder:tracking-[0em]
                      
                      
                    " [class.border-red-500]="otpForm.get('otp')?.invalid && otpForm.get('otp')?.touched">


                </div>
              </div>

              @if (otpForm.get('otp')?.invalid && otpForm.get('otp')?.touched) {
              <div class="text-red-500 text-center text-sm font-medium">
                Please enter the 4 digits.
              </div>
              }

              <div class="text-center text-gray-600 text-lg mt-4">
                Didn't receive it?
                <button type="button"
                  class="text-gray-900 underline font-medium hover:text-[var(--color-dark-pink)] ml-2 transition cursor-pointer">
                  Resend code
                </button>
              </div>

              <button type="submit" [disabled]="otpForm.invalid" class="w-full bg-[var(--color-dark-pink)] text-white text-xl py-4 rounded-2xl transition-all shadow-md
                 hover:brightness-110 hover:shadow-lg hover:-translate-y-0.5 cursor-pointer
                 disabled:bg-gray-300 disabled:cursor-not-allowed disabled:shadow-none disabled:translate-y-0">
                Verify
              </button>

            </form>

            <div class="text-center mt-6">
              <a routerLink="/forgot-password"
                class="text-sm text-gray-400 hover:text-gray-600 transition cursor-pointer">
                Change Phone Number
              </a>
            </div>

          </div>
        </div>
